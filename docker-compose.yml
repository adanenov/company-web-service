version: "3.9"

services:
  web:
    build: .
    container_name: company-web
    restart: always
    environment:
      - PORT=${PORT}
    # НЕ МАППИРУЕМ порт наружу, доступ через Nginx только

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro